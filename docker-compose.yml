services:
  flow-ledger-core-db:
    image: postgres:17-alpine
    container_name: flow-ledger-core-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - flow_ledger_core_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  flow-ledger-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flow-ledger-core
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_NAME: ${API_NAME:-flow-ledger-core}
      API_PORT: ${API_PORT:-3000}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@flow-ledger-core-db:5432/${POSTGRES_DB}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRES_IN_DAYS: ${ACCESS_TOKEN_EXPIRES_IN_DAYS:-1}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:-7}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      flow-ledger-core-db:
        condition: service_healthy

volumes:
  flow_ledger_core_db:
